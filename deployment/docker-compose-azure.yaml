services:
  frontend:
    build: ../frontend
    environment:
      - VITE_API_HOST=http://localhost:7091
      - VITE_API_STREAMING=$VITE_API_STREAMING
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ../application
    env_file:
      - ../.env
    environment:
      # Override URLs to use docker service names
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "7091:7091"
    volumes:
      - ../application/indexes:/app/application/indexes
      - ../application/inputs:/app/application/inputs
      - ../application/vectors:/app/application/vectors
    depends_on:
        - redis

  worker:
    build: ../application
    command: celery -A application.app.celery worker -l INFO
    env_file:
      - ../.env
    environment:
      # Override URLs to use docker service names
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - API_URL=http://backend:7091
    depends_on:
        - redis

  redis:
    image: redis:6-alpine
    ports:
      - 6379:6379
