name: docsgpt-oss
services:

  frontend:
    image: arc53/docsgpt-fe:develop
    environment:
      - VITE_API_HOST=http://localhost:7091
      - VITE_API_STREAMING=${VITE_API_STREAMING:-true}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend


  backend:
    user: root
    image: arc53/docsgpt:develop
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CACHE_REDIS_URL=redis://redis:6379/2
      - POSTGRES_URI=postgresql://docsgpt:docsgpt@postgres:5432/docsgpt
      # Code-execution runner reached over HTTP + WebSocket (no docker socket).
      - SANDBOX_GATEWAY_URL=http://docsgpt-sandbox:8888
      # Env-scrubbing kernelspec the docsgpt-sandbox image installs.
      - SANDBOX_KERNEL_NAME=docsgpt-python
    ports:
      - "7091:7091"
    networks:
      # `default` reaches the sandbox gateway; `data-net` reaches redis/postgres
      # (which are NOT on the sandbox's networks).
      - default
      - data-net
    volumes:
      - ../application/indexes:/app/indexes
      - ../application/inputs:/app/inputs
      - ../application/vectors:/app/vectors
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy


  worker:
    user: root
    image: arc53/docsgpt:develop
    # `parsing` queue carries read_document/parse_document; required for its await to resolve.
    command: celery -A application.app.celery worker -l INFO -B -Q docsgpt,parsing
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - API_URL=http://backend:7091
      - CACHE_REDIS_URL=redis://redis:6379/2
      - POSTGRES_URI=postgresql://docsgpt:docsgpt@postgres:5432/docsgpt
      - SANDBOX_GATEWAY_URL=http://docsgpt-sandbox:8888
      - SANDBOX_KERNEL_NAME=docsgpt-python
    networks:
      - default
      - data-net
    volumes:
      - ../application/indexes:/app/indexes
      - ../application/inputs:/app/inputs
      - ../application/vectors:/app/vectors
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # Always-on code-execution runner (Jupyter Kernel Gateway). In-process kernels,
  # no Docker socket, no published host port. On the internal-only sandbox-net
  # plus `default` (for internet egress); deliberately NOT on data-net, so
  # sandboxed code cannot reach the unauthenticated redis broker (Celery task
  # injection -> RCE) or postgres. Do NOT add `env_file: ../.env` here -- the
  # runner needs no app secrets. For untrusted multi-tenant workloads use a
  # per-session VM via SANDBOX_BACKEND=daytona instead.
  docsgpt-sandbox:
    # Built from the repo (no published arc53/docsgpt-sandbox image exists yet); the
    # hub compose ships alongside ./sandbox, so this stays self-contained and the
    # stack always starts. Switch to a published image once CI builds/pushes one.
    build: ./sandbox
    mem_limit: ${SANDBOX_MEMORY:-1g}
    cpus: ${SANDBOX_CPUS:-1.0}
    pids_limit: 256
    read_only: true
    environment:
      # Keep Jupyter's runtime/connection files on the writable tmpfs.
      - JUPYTER_RUNTIME_DIR=/tmp/jupyter-runtime
      - JUPYTER_DATA_DIR=/tmp/jupyter-data
    tmpfs:
      - /tmp
    networks:
      - sandbox-net
      - default

  redis:
    image: redis:6-alpine
    # Data plane only: kept off the sandbox's networks (a reachable, unauthed
    # broker = Celery task injection -> worker RCE).
    networks:
      - data-net
    ports:
      - 6379:6379

  postgres:
    image: postgres:16-alpine
    # Data plane only (see redis): kept off the sandbox's networks.
    networks:
      - data-net
    environment:
      - POSTGRES_USER=docsgpt
      - POSTGRES_PASSWORD=docsgpt
      - POSTGRES_DB=docsgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsgpt -d docsgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  # Internal-only runner network (no external egress via this net; the sandbox
  # still reaches the internet via the default bridge).
  sandbox-net:
    internal: true
  # Internal data plane: redis/postgres + backend/worker. The sandbox is NOT
  # attached, so sandboxed code cannot reach the broker or database.
  data-net:
    internal: true

volumes:
  postgres_data:
