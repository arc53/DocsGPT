name: docsgpt-oss
services:

  redis:
    image: redis:6-alpine
    ports:
      - 6379:6379

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=docsgpt
      - POSTGRES_PASSWORD=docsgpt
      - POSTGRES_DB=docsgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsgpt -d docsgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
